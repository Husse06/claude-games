<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #30363d;
    --accent: #f5a623;
    --accent2: #e8c96a;
    --text: #e6edf3;
    --muted: #8b949e;
    --common: #aaa;
    --uncommon: #57e389;
    --rare: #5dc8f5;
    --epic: #c061cb;
    --legendary: #f5a623;
    --green: #3fb950;
    --red: #f85149;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Ambient sparkle canvas ── */
  #sparkle-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .sparkle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle-drift linear forwards;
    opacity: 0;
  }
  @keyframes sparkle-drift {
    0%   { opacity: 0;   transform: translateY(0) scale(0.5); }
    15%  { opacity: 0.7; transform: translateY(-15px) scale(1); }
    85%  { opacity: 0.4; }
    100% { opacity: 0;   transform: translateY(-120px) scale(0.3); }
  }

  /* ── Layout ── */
  #app {
    display: grid;
    grid-template-columns: 285px 1fr 285px;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  #header {
    grid-column: 1 / -1;
    background: linear-gradient(90deg, #0d1117, #161b22, #0d1117);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  #header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }
  #header .header-icon { font-size: 2rem; filter: drop-shadow(0 0 8px rgba(245,166,35,0.7)); }
  #header h1 {
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent), #fff5cc, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }
  #header .subtitle { color: var(--muted); font-size: 0.75rem; letter-spacing: 1px; }
  #header .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #header .save-indicator { font-size: 0.65rem; color: var(--muted); }
  #header .reset-btn {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.2s;
  }
  #header .reset-btn:hover { background: var(--red); color: #fff; box-shadow: 0 0 12px rgba(248,81,73,0.4); }

  /* ── Panels ── */
  #left-panel, #right-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    max-height: calc(100vh - 57px);
  }
  #right-panel { border-right: none; border-left: 1px solid var(--border); }

  #center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 16px;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 50% 60%, rgba(245,166,35,0.03) 0%, transparent 70%);
  }

  /* ── Panel title ── */
  .panel-title {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Level badge ── */
  #level-badge {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 18px;
    width: 100%;
    max-width: 420px;
    position: relative;
    overflow: hidden;
  }
  #level-badge::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent), #c8800a);
  }
  .lvl-circle {
    background: linear-gradient(135deg, var(--accent), #c8800a);
    color: #000;
    font-weight: 900;
    font-size: 1.3rem;
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(245,166,35,0.5);
    flex-shrink: 0;
    animation: badge-pulse 3s ease-in-out infinite;
  }
  @keyframes badge-pulse {
    0%, 100% { box-shadow: 0 0 16px rgba(245,166,35,0.4); }
    50%       { box-shadow: 0 0 28px rgba(245,166,35,0.8); }
  }
  .lvl-info { flex: 1; }
  .lvl-title { font-weight: 700; font-size: 0.95rem; color: var(--text); }
  .lvl-sub   { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* ── Stat boxes ── */
  #stats-strip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 420px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.3s;
  }
  .stat-box:nth-child(1) { border-top: 2px solid #f5a623; }
  .stat-box:nth-child(2) { border-top: 2px solid #5dc8f5; }
  .stat-box:nth-child(3) { border-top: 2px solid #57e389; }
  .stat-box:nth-child(4) { border-top: 2px solid #c061cb; }
  .stat-icon { font-size: 1.4rem; flex-shrink: 0; }
  .stat-text .label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-text .value { font-size: 1.05rem; font-weight: 800; margin-top: 1px; }
  .stat-box:nth-child(1) .value { color: #f5a623; }
  .stat-box:nth-child(2) .value { color: #5dc8f5; }
  .stat-box:nth-child(3) .value { color: #57e389; }
  .stat-box:nth-child(4) .value { color: #c061cb; }

  /* ── Multiplier ── */
  #multiplier-display {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #multiplier-display span { color: var(--uncommon); font-weight: 800; }

  /* ── XP bar ── */
  #xp-container {
    width: 100%;
    max-width: 420px;
  }
  #xp-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 5px;
    align-items: center;
  }
  #xp-label .xp-icon { font-size: 0.85rem; }
  #xp-bar-bg {
    height: 12px;
    background: var(--surface2);
    border-radius: 999px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  #xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #d4860f, #f5a623, #ffe580);
    border-radius: 999px;
    transition: width 0.35s ease;
    width: 0%;
    position: relative;
  }
  #xp-bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: -60%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: shimmer 2.5s ease infinite;
  }
  @keyframes shimmer {
    0%   { left: -60%; }
    100% { left: 110%; }
  }

  /* ── DIG button ── */
  #dig-wrap {
    position: relative;
    width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
  }
  .dig-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: conic-gradient(from 0deg, var(--accent), transparent, var(--accent));
    animation: ring-spin 4s linear infinite;
    opacity: 0.4;
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 2px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 2px), #fff calc(100% - 2px));
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }

  #dig-btn {
    width: 148px; height: 148px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: radial-gradient(circle at 35% 30%, #2f2208, #0d1117);
    color: var(--accent);
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 3px;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow:
      0 0 30px rgba(245,166,35,0.25),
      0 0 60px rgba(245,166,35,0.08),
      inset 0 0 30px rgba(245,166,35,0.06);
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  #dig-btn:hover {
    box-shadow:
      0 0 50px rgba(245,166,35,0.5),
      0 0 100px rgba(245,166,35,0.15),
      inset 0 0 30px rgba(245,166,35,0.12);
    transform: scale(1.04);
  }
  #dig-btn:active { transform: scale(0.94); }
  .dig-icon { font-size: 2.6rem; line-height: 1; filter: drop-shadow(0 0 8px rgba(245,166,35,0.8)); }
  .dig-label { font-size: 0.85rem; font-weight: 900; letter-spacing: 4px; }

  @keyframes dig-shake {
    0%   { transform: rotate(0deg) scale(1); }
    12%  { transform: rotate(-10deg) scale(0.95); }
    28%  { transform: rotate(9deg) scale(0.97); }
    44%  { transform: rotate(-7deg) scale(0.96); }
    60%  { transform: rotate(6deg) scale(0.98); }
    76%  { transform: rotate(-2deg) scale(1); }
    100% { transform: rotate(0deg) scale(1); }
  }
  #dig-btn.shaking { animation: dig-shake 0.4s ease; }

  #dig-sub { font-size: 0.68rem; color: var(--muted); }

  /* ── Float text ── */
  .float-text {
    position: fixed;
    pointer-events: none;
    font-weight: 800;
    font-size: 1rem;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    z-index: 9999;
    animation: float-up 1.3s ease forwards;
    white-space: nowrap;
  }
  @keyframes float-up {
    0%   { opacity: 1;   transform: translateY(0)     scale(1); }
    20%  { opacity: 1;   transform: translateY(-10px) scale(1.15); }
    100% { opacity: 0;   transform: translateY(-80px) scale(0.8); }
  }

  /* ── Particles ── */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 9000;
    animation: particle-anim var(--dur,0.9s) ease forwards;
  }
  @keyframes particle-anim {
    0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0) rotate(var(--rot,180deg)); }
  }

  /* ── Treasure popup ── */
  #treasure-popup {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10000;
    background: rgba(0,0,0,0.65);
    animation: popup-bg 2.4s ease forwards;
    pointer-events: none;
  }
  .popup-box {
    background: linear-gradient(135deg, #1c2230, #161b22);
    border: 2px solid var(--epic);
    border-radius: 20px;
    padding: 36px 56px;
    text-align: center;
    animation: treasure-pop 2.4s ease forwards;
    position: relative;
    overflow: hidden;
  }
  .popup-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(192,97,203,0.15), transparent 60%);
  }
  .popup-box.legendary { border-color: var(--legendary); }
  .popup-box.legendary::before { background: radial-gradient(circle at 50% 0%, rgba(245,166,35,0.2), transparent 60%); }
  .pop-rarity { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
  .pop-icon { font-size: 4.5rem; line-height: 1; filter: drop-shadow(0 0 20px currentColor); }
  .pop-name { font-size: 1.6rem; font-weight: 900; margin-top: 10px; }
  .pop-rewards { color: var(--muted); margin-top: 8px; font-size: 0.9rem; }
  @keyframes treasure-pop {
    0%   { opacity: 0; transform: scale(0.4) rotate(-8deg); }
    18%  { opacity: 1; transform: scale(1.18) rotate(3deg); }
    28%  { transform: scale(0.94) rotate(-1deg); }
    38%  { transform: scale(1.04); }
    50%  { transform: scale(1); }
    72%  { opacity: 1; }
    100% { opacity: 0; transform: scale(0.85) translateY(-30px); }
  }
  @keyframes popup-bg { 0%,70%{ opacity:1; } 100%{ opacity:0; } }

  /* ── Level-up banner ── */
  #levelup-banner {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10001;
    background: linear-gradient(135deg, #1a1f0d, #1c2230);
    border: 2px solid var(--accent);
    border-radius: 20px;
    padding: 28px 64px;
    text-align: center;
    pointer-events: none;
    animation: banner-anim 2.2s ease forwards;
    box-shadow: 0 0 60px rgba(245,166,35,0.3);
  }
  #levelup-banner .banner-icon { font-size: 2.5rem; }
  #levelup-banner h2 { color: var(--accent); font-size: 2.2rem; font-weight: 900; text-shadow: 0 0 30px rgba(245,166,35,0.7); margin-top: 4px; }
  #levelup-banner p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }
  @keyframes banner-anim {
    0%   { opacity: 0; transform: translate(-50%, -65%) scale(0.8); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.02); }
    25%  { transform: translate(-50%, -50%) scale(1); }
    70%  { opacity: 1; transform: translate(-50%, -50%); }
    100% { opacity: 0; transform: translate(-50%, -42%) scale(0.9); }
  }

  /* ── Shop ── */
  .shop-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .shop-tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 10px 4px;
    cursor: pointer;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .shop-tab:hover { color: var(--text); }
  .shop-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .shop-list { padding: 8px; display: flex; flex-direction: column; gap: 6px; }

  .shop-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.18s;
    position: relative;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .shop-item:hover:not(.locked):not(.cant-afford) {
    border-color: var(--accent);
    background: #1d2535;
    transform: translateX(2px);
    box-shadow: -3px 0 0 var(--accent);
  }
  .shop-item.locked { opacity: 0.38; cursor: not-allowed; }
  .shop-item.cant-afford { opacity: 0.55; cursor: not-allowed; }
  .shop-item.owned-active {
    border-color: var(--green);
    background: rgba(63,185,80,0.07);
    box-shadow: -3px 0 0 var(--green);
  }

  .shop-item-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1; margin-top: 2px; }
  .shop-item-body { flex: 1; min-width: 0; }
  .shop-item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; }
  .shop-item-name { font-weight: 700; font-size: 0.83rem; }
  .shop-item-cost { font-size: 0.73rem; color: var(--accent); font-weight: 700; white-space: nowrap; flex-shrink: 0; }
  .shop-item-desc { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
  .shop-item.cant-afford .shop-item-cost { color: var(--red); }
  .shop-item-count {
    position: absolute; top: 7px; right: 7px;
    background: linear-gradient(135deg, var(--accent), #c8800a);
    color: #000;
    border-radius: 999px;
    font-size: 0.6rem; font-weight: 900;
    padding: 1px 7px;
  }
  .shop-item.owned-active .shop-item-cost { color: var(--green); }

  /* ── Recent Finds ── */
  #log-list {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-height: 270px;
    overflow-y: auto;
  }
  .log-entry {
    font-size: 0.71rem;
    padding: 5px 8px;
    background: var(--surface2);
    border-radius: 5px;
    border-left: 3px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: log-in 0.25s ease;
  }
  @keyframes log-in {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .log-entry.common    { border-left-color: var(--common); }
  .log-entry.uncommon  { border-left-color: var(--uncommon); }
  .log-entry.rare      { border-left-color: var(--rare); }
  .log-entry.epic      { border-left-color: var(--epic); background: rgba(192,97,203,0.06); }
  .log-entry.legendary { border-left-color: var(--legendary); background: rgba(245,166,35,0.07); }
  .log-rewards { color: var(--muted); font-size: 0.62rem; white-space: nowrap; }

  /* ── Collection ── */
  .section-title {
    font-size: 0.63rem; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent);
    padding: 10px 14px 7px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  #collection-grid {
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }
  .coll-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 4px 5px;
    text-align: center;
    position: relative;
    transition: all 0.2s;
    cursor: default;
  }
  .coll-item:not(.undiscovered):hover {
    border-color: var(--accent);
    transform: scale(1.06);
  }
  .coll-icon { font-size: 1.4rem; line-height: 1; }
  .coll-name { font-size: 0.52rem; color: var(--muted); margin-top: 3px; }
  .coll-count {
    position: absolute; top: 2px; right: 3px;
    font-size: 0.52rem; font-weight: 800; color: var(--text);
  }
  .coll-item.undiscovered { opacity: 0.18; filter: grayscale(1) blur(1px); }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Offline notice ── */
  #offline-notice {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px; padding: 12px 24px;
    font-size: 0.85rem; z-index: 9999;
    animation: slide-up 0.4s ease, fade-out 0.4s ease 3.6s forwards;
    pointer-events: none;
    box-shadow: 0 0 20px rgba(245,166,35,0.3);
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translate(-50%, 20px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }
  @keyframes fade-out { to { opacity: 0; } }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    #app { grid-template-columns: 1fr; }
    #left-panel, #right-panel { max-height: none; border: none; border-bottom: 1px solid var(--border); }
    #right-panel { border-left: none; }
    #center-panel { padding: 16px; }
  }
</style>
</head>
<body>

<div id="sparkle-layer"></div>

<div id="app">

  <header id="header">
    <div class="header-icon">⛏️</div>
    <div>
      <h1>TREASURE HUNTER</h1>
      <div class="subtitle">⚡ Idle treasure digging adventure</div>
    </div>
    <div class="header-right">
      <span class="save-indicator" id="save-indicator">💾 Auto-saves</span>
      <button class="reset-btn" onclick="resetGame()">🗑 Reset</button>
    </div>
  </header>

  <!-- LEFT: Shop -->
  <aside id="left-panel">
    <div class="panel-title">🛒 Shop</div>
    <div class="shop-tabs">
      <button class="shop-tab active" onclick="switchTab('shovels',this)">⛏️ Shovels</button>
      <button class="shop-tab" onclick="switchTab('miners',this)">👷 Miners</button>
      <button class="shop-tab" onclick="switchTab('accessories',this)">💍 Gear</button>
    </div>
    <div id="shop-content" class="shop-list"></div>
  </aside>

  <!-- CENTER -->
  <main id="center-panel">

    <div id="level-badge">
      <div class="lvl-circle" id="lvl-num">1</div>
      <div class="lvl-info">
        <div class="lvl-title" id="lvl-title">Novice Hunter</div>
        <div class="lvl-sub" id="lvl-sub">⛏️ Using: Wooden Shovel</div>
      </div>
    </div>

    <div id="stats-strip">
      <div class="stat-box">
        <div class="stat-icon">🪙</div>
        <div class="stat-text">
          <div class="label">Coins</div>
          <div class="value" id="stat-coins">0</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">👆</div>
        <div class="stat-text">
          <div class="label">Per Click</div>
          <div class="value" id="stat-cpc">0</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">⚡</div>
        <div class="stat-text">
          <div class="label">Per Second</div>
          <div class="value" id="stat-cps">0/s</div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">🏆</div>
        <div class="stat-text">
          <div class="label">Total Digs</div>
          <div class="value" id="stat-digs">0</div>
        </div>
      </div>
    </div>

    <div id="multiplier-display">✨ Global multiplier: <span id="mult-val">1.00×</span></div>

    <div id="xp-container">
      <div id="xp-label">
        <span><span class="xp-icon">⭐</span> Experience</span>
        <span id="xp-text">0 / 100</span>
      </div>
      <div id="xp-bar-bg">
        <div id="xp-bar-fill"></div>
      </div>
    </div>

    <div id="dig-wrap">
      <div class="dig-ring"></div>
      <button id="dig-btn" onclick="dig(event)">
        <span class="dig-icon">⛏️</span>
        <span class="dig-label">DIG</span>
      </button>
    </div>

    <div id="dig-sub">🌍 Click to dig for treasure!</div>

  </main>

  <!-- RIGHT: Log + Collection -->
  <aside id="right-panel">
    <div class="panel-title">📜 Recent Finds</div>
    <div id="log-list"></div>
    <div class="section-title">🗂️ Collection</div>
    <div id="collection-grid"></div>
  </aside>

</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────

const SHOVELS = [
  { id: 'wooden',  icon: '🪵', name: 'Wooden Shovel',       cost: 0,      cpc: 1,   xpc: 1,  unlockLvl: 1,  desc: 'A trusty stick + plank combo.' },
  { id: 'iron',    icon: '🔨', name: 'Iron Shovel',          cost: 150,    cpc: 3,   xpc: 2,  unlockLvl: 3,  desc: 'Sturdy iron. Digs deeper.' },
  { id: 'steel',   icon: '⚙️', name: 'Steel Shovel',         cost: 800,    cpc: 8,   xpc: 5,  unlockLvl: 7,  desc: 'Tempered steel edge.' },
  { id: 'diamond', icon: '💎', name: 'Diamond Shovel',       cost: 5000,   cpc: 25,  xpc: 12, unlockLvl: 12, desc: 'Cuts through anything.' },
  { id: 'ancient', icon: '🏺', name: 'Ancient Relic Shovel', cost: 50000,  cpc: 100, xpc: 40, unlockLvl: 20, desc: 'Forged by forgotten gods.' },
];

const MINERS = [
  { id: 'apprentice', icon: '🧑', name: 'Apprentice Miner',    baseCost: 50,     cps: 0.5,  xps: 0.3,  unlockLvl: 1,  desc: 'Young and eager.' },
  { id: 'skilled',    icon: '👷', name: 'Skilled Miner',        baseCost: 350,    cps: 2.0,  xps: 1.0,  unlockLvl: 5,  desc: 'Has a nose for gold.' },
  { id: 'expert',     icon: '🧑‍🔧', name: 'Expert Miner',        baseCost: 2500,   cps: 8.0,  xps: 3.5,  unlockLvl: 10, desc: 'Veteran of the deep.' },
  { id: 'master',     icon: '👨‍🏭', name: 'Master Miner',        baseCost: 20000,  cps: 30.0, xps: 12.0, unlockLvl: 15, desc: 'Commands the earth.' },
  { id: 'legendary',  icon: '🧙', name: 'Legendary Prospector', baseCost: 200000, cps: 150.0,xps: 50.0, unlockLvl: 25, desc: 'A myth among diggers.' },
];

const ACCESSORIES = [
  { id: 'lucky',   icon: '🍀', name: 'Lucky Charm',     cost: 500,    bonus: 0.10, unlockLvl: 2,  desc: '+10% all income.' },
  { id: 'map',     icon: '🗺️', name: 'Treasure Map',    cost: 3000,   bonus: 0.20, unlockLvl: 6,  desc: '+20% all income.' },
  { id: 'rod',     icon: '🔱', name: 'Dowsing Rod',     cost: 15000,  bonus: 0.35, unlockLvl: 11, desc: '+35% all income.' },
  { id: 'compass', icon: '🧭', name: 'Ancient Compass', cost: 75000,  bonus: 0.60, unlockLvl: 18, desc: '+60% all income.' },
  { id: 'eye',     icon: '👁️', name: 'Dragon Eye',      cost: 500000, bonus: 1.50, unlockLvl: 30, desc: '+150% all income.' },
];

const TREASURES = [
  { id: 'dirt',     name: 'Dirt',             rarity: 'common',    icon: '🟤', xp: 1,   coins: 1,   unlockLvl: 1,  weight: 500 },
  { id: 'stone',    name: 'Stone',            rarity: 'common',    icon: '🪨', xp: 1,   coins: 1,   unlockLvl: 1,  weight: 400 },
  { id: 'coal',     name: 'Coal',             rarity: 'common',    icon: '⚫', xp: 2,   coins: 2,   unlockLvl: 1,  weight: 250 },
  { id: 'iron',     name: 'Iron Ore',         rarity: 'uncommon',  icon: '🔩', xp: 4,   coins: 3,   unlockLvl: 1,  weight: 150 },
  { id: 'gold',     name: 'Gold Nugget',      rarity: 'uncommon',  icon: '🏅', xp: 6,   coins: 8,   unlockLvl: 3,  weight: 80  },
  { id: 'ruby',     name: 'Ruby',             rarity: 'rare',      icon: '♦️', xp: 12,  coins: 20,  unlockLvl: 5,  weight: 35  },
  { id: 'emerald',  name: 'Emerald',          rarity: 'rare',      icon: '💚', xp: 15,  coins: 25,  unlockLvl: 8,  weight: 25  },
  { id: 'sapphire', name: 'Sapphire',         rarity: 'rare',      icon: '💠', xp: 18,  coins: 30,  unlockLvl: 10, weight: 18  },
  { id: 'diamond',  name: 'Diamond',          rarity: 'epic',      icon: '💎', xp: 35,  coins: 75,  unlockLvl: 14, weight: 8   },
  { id: 'obsidian', name: 'Obsidian',         rarity: 'epic',      icon: '🔮', xp: 30,  coins: 60,  unlockLvl: 16, weight: 5   },
  { id: 'artifact', name: 'Ancient Artifact', rarity: 'legendary', icon: '🏺', xp: 100, coins: 300, unlockLvl: 20, weight: 1   },
];

const RARITY_COLOR = {
  common:    '#aaa',
  uncommon:  '#57e389',
  rare:      '#5dc8f5',
  epic:      '#c061cb',
  legendary: '#f5a623',
};

const RARITY_PARTICLES = {
  common:    ['#aaa','#ccc','#888'],
  uncommon:  ['#57e389','#3fb950','#a8ffbc'],
  rare:      ['#5dc8f5','#3dafd4','#a0e8ff'],
  epic:      ['#c061cb','#9a3faa','#e89ded'],
  legendary: ['#f5a623','#e8c96a','#fff5a0','#ff9500'],
};

const LEVEL_TITLES = [
  '', 'Novice Hunter', 'Dirt Digger', 'Stone Seeker', 'Iron Finder', 'Bronze Prospector',
  'Silver Scout', 'Gold Gazer', 'Gem Hunter', 'Crystal Seeker', 'Cave Explorer',
  'Deep Diver', 'Diamond Hunter', 'Relic Seeker', 'Lore Keeper', 'Master Miner',
  'Ancient Seeker', 'Realm Digger', 'Legendary Finder', 'Mythic Prospector', 'Grandmaster',
  'Titan Hunter', 'Cosmos Digger', 'Star Finder', 'Universe Seeker', 'Dragon Hunter',
  'Void Walker', 'Abyss Delver', 'Elder Prospector', 'Immortal Hunter', 'God of Treasures',
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

let gs = {
  coins: 0, xp: 0, level: 1, totalDigs: 0,
  currentShovel: 'wooden',
  miners: {}, accessories: {}, inventory: {}, log: [],
  lastSave: Date.now(),
};

let currentTab = 'shovels';
let xpAccum = 0;

// ─────────────────────────────────────────────
// FORMULAS
// ─────────────────────────────────────────────

const xpRequired = lvl => Math.floor(lvl * 100 * Math.pow(1.15, lvl));
const getShovel  = ()  => SHOVELS.find(s => s.id === gs.currentShovel) || SHOVELS[0];

function globalMultiplier() {
  let b = 0;
  for (const a of ACCESSORIES) if (gs.accessories[a.id]) b += a.bonus;
  return 1 + b;
}
const coinsPerClick  = () => getShovel().cpc * globalMultiplier();
const coinsPerSecond = () => MINERS.reduce((t,m) => t + m.cps*(gs.miners[m.id]||0), 0) * globalMultiplier();
const xpPerSecond    = () => MINERS.reduce((t,m) => t + m.xps*(gs.miners[m.id]||0), 0);
const minerCost      = m  => Math.floor(m.baseCost * Math.pow(1.15, gs.miners[m.id]||0));

// ─────────────────────────────────────────────
// ROLL
// ─────────────────────────────────────────────

function rollTreasure() {
  const pool = TREASURES.filter(t => t.unlockLvl <= gs.level);
  const total = pool.reduce((s,t) => s+t.weight, 0);
  let r = Math.random() * total;
  for (const t of pool) { r -= t.weight; if (r <= 0) return t; }
  return pool[pool.length-1];
}

// ─────────────────────────────────────────────
// DIG
// ─────────────────────────────────────────────

function dig(event) {
  const btn = document.getElementById('dig-btn');
  btn.classList.remove('shaking');
  void btn.offsetWidth;
  btn.classList.add('shaking');
  btn.addEventListener('animationend', () => btn.classList.remove('shaking'), {once:true});

  const mult    = globalMultiplier();
  const shovel  = getShovel();
  const earned  = shovel.cpc * mult;
  const earnXP  = shovel.xpc;

  gs.coins += earned;
  gs.totalDigs++;

  const treasure = rollTreasure();
  const tCoins   = treasure.coins * mult;
  gs.coins += tCoins;
  addXP(earnXP + treasure.xp);
  gs.inventory[treasure.id] = (gs.inventory[treasure.id]||0) + 1;

  const totalCoins = Math.floor(earned + tCoins);
  gs.log.unshift({ name: treasure.name, rarity: treasure.rarity, icon: treasure.icon, coins: totalCoins, xp: earnXP + treasure.xp });
  if (gs.log.length > 20) gs.log.pop();

  if (event) {
    spawnFloat(event.clientX, event.clientY, `+${fmt(totalCoins)} 🪙`, '#f5a623');
    if (treasure.rarity !== 'common') {
      setTimeout(() => spawnFloat(event.clientX + 28, event.clientY - 18, treasure.icon, RARITY_COLOR[treasure.rarity]), 120);
    }
    spawnParticles(event.clientX, event.clientY, treasure.rarity);
  }

  if (treasure.rarity === 'epic' || treasure.rarity === 'legendary') showTreasurePopup(treasure);

  renderAll();
}

function addXP(amount) {
  gs.xp += amount;
  checkLevelUp();
}

function checkLevelUp() {
  while (true) {
    const req = xpRequired(gs.level);
    if (gs.xp >= req) { gs.xp -= req; gs.level++; showLevelUp(); } else break;
  }
}

// ─────────────────────────────────────────────
// ANIMATIONS
// ─────────────────────────────────────────────

function spawnFloat(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.cssText = `left:${x-24}px; top:${y-8}px; color:${color||'#f5a623'}; text-shadow:0 0 10px ${color||'#f5a623'}88;`;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function spawnParticles(x, y, rarity) {
  const colors = RARITY_PARTICLES[rarity] || RARITY_PARTICLES.common;
  const count  = rarity === 'legendary' ? 20 : rarity === 'epic' ? 16 : rarity === 'rare' ? 12 : 8;
  const shapes = ['50%', '0%', '20%']; // circle, square, slightly rounded

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size  = 4 + Math.random() * 8;
    const angle = (Math.PI * 2 * i / count) + Math.random() * 0.5;
    const dist  = 40 + Math.random() * 80;
    const dur   = 0.6 + Math.random() * 0.6;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${x}px; top:${y}px;
      background:${color};
      border-radius:${shape};
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      --dur:${dur}s;
      --rot:${Math.random()*360}deg;
      box-shadow: 0 0 4px ${color};
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

function showTreasurePopup(t) {
  document.getElementById('treasure-popup')?.remove();
  const el = document.createElement('div');
  el.id = 'treasure-popup';
  el.innerHTML = `
    <div class="popup-box ${t.rarity}">
      <div class="pop-rarity" style="color:${RARITY_COLOR[t.rarity]}">${t.rarity.toUpperCase()} FIND!</div>
      <div class="pop-icon">${t.icon}</div>
      <div class="pop-name" style="color:${RARITY_COLOR[t.rarity]}">${t.name}</div>
      <div class="pop-rewards">🪙 +${t.coins} coins &nbsp;·&nbsp; ⭐ +${t.xp} XP</div>
    </div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

function showLevelUp() {
  document.getElementById('levelup-banner')?.remove();
  const el = document.createElement('div');
  el.id = 'levelup-banner';
  const title = LEVEL_TITLES[Math.min(gs.level, LEVEL_TITLES.length-1)] || `Level ${gs.level}`;
  el.innerHTML = `<div class="banner-icon">🎉</div><h2>LEVEL UP!</h2><p>You are now <strong>${title}</strong> · Lvl ${gs.level}</p>`;
  document.body.appendChild(el);
  // Burst from center
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  spawnParticles(cx, cy, 'legendary');
  spawnParticles(cx-50, cy+30, 'epic');
  spawnParticles(cx+50, cy+30, 'rare');
  setTimeout(() => el.remove(), 2200);
}

// ─────────────────────────────────────────────
// AMBIENT SPARKLES
// ─────────────────────────────────────────────

const SPARKLE_COLORS = ['#f5a623','#e8c96a','#5dc8f5','#57e389','#c061cb','#fff','#ffe580'];
function spawnAmbientSparkle() {
  const layer = document.getElementById('sparkle-layer');
  const el    = document.createElement('div');
  el.className = 'sparkle';
  const size  = 2 + Math.random() * 4;
  const color = SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)];
  const dur   = 3 + Math.random() * 4;
  el.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${60 + Math.random()*40}%;
    background:${color};
    box-shadow: 0 0 ${size*2}px ${color};
    animation-duration: ${dur}s;
  `;
  layer.appendChild(el);
  setTimeout(() => el.remove(), dur * 1000);
}
setInterval(spawnAmbientSparkle, 180);

// ─────────────────────────────────────────────
// SHOP
// ─────────────────────────────────────────────

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderShop();
}

function buyShovel(id) {
  const s = SHOVELS.find(x => x.id === id);
  if (!s || gs.level < s.unlockLvl || s.id === gs.currentShovel || gs.coins < s.cost) return;
  gs.coins -= s.cost;
  gs.currentShovel = s.id;
  renderAll();
}
function buyMiner(id) {
  const m = MINERS.find(x => x.id === id);
  if (!m || gs.level < m.unlockLvl) return;
  const cost = minerCost(m);
  if (gs.coins < cost) return;
  gs.coins -= cost;
  gs.miners[m.id] = (gs.miners[m.id]||0) + 1;
  renderAll();
}
function buyAccessory(id) {
  const a = ACCESSORIES.find(x => x.id === id);
  if (!a || gs.level < a.unlockLvl || gs.accessories[a.id] || gs.coins < a.cost) return;
  gs.coins -= a.cost;
  gs.accessories[a.id] = true;
  renderAll();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────

function fmt(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

function renderStats() {
  document.getElementById('stat-coins').textContent = fmt(gs.coins);
  document.getElementById('stat-cpc').textContent   = fmt(coinsPerClick());
  document.getElementById('stat-cps').textContent   = fmt(coinsPerSecond())+'/s';
  document.getElementById('stat-digs').textContent  = fmt(gs.totalDigs);
  document.getElementById('mult-val').textContent   = globalMultiplier().toFixed(2)+'×';
  document.getElementById('lvl-num').textContent    = gs.level;
  const title = LEVEL_TITLES[Math.min(gs.level, LEVEL_TITLES.length-1)] || `Level ${gs.level}`;
  document.getElementById('lvl-title').textContent = title;
  document.getElementById('lvl-sub').textContent   = `⛏️ Using: ${getShovel().name}`;
  const req = xpRequired(gs.level);
  const pct = Math.min(100, (gs.xp / req) * 100);
  document.getElementById('xp-bar-fill').style.width = pct+'%';
  document.getElementById('xp-text').textContent = `${fmt(gs.xp)} / ${fmt(req)}`;
}

function renderLog() {
  const list = document.getElementById('log-list');
  list.innerHTML = '';
  for (const e of gs.log) {
    const d = document.createElement('div');
    d.className = `log-entry ${e.rarity}`;
    d.innerHTML = `<span style="color:${RARITY_COLOR[e.rarity]}">${e.icon} ${e.name}</span><span class="log-rewards">+${e.coins}🪙 +${e.xp}⭐</span>`;
    list.appendChild(d);
  }
}

function renderCollection() {
  const grid = document.getElementById('collection-grid');
  grid.innerHTML = '';
  for (const t of TREASURES) {
    const count = gs.inventory[t.id] || 0;
    const found = count > 0;
    const d = document.createElement('div');
    d.className = 'coll-item' + (found ? '' : ' undiscovered');
    d.title = found ? `${t.name} ×${count} — ${t.rarity}` : '???';
    d.innerHTML = `
      <div class="coll-icon">${t.icon}</div>
      <div class="coll-name" style="color:${found ? RARITY_COLOR[t.rarity] : 'inherit'}">${found ? t.name : '???'}</div>
      ${found ? `<div class="coll-count">×${count}</div>` : ''}`;
    grid.appendChild(d);
  }
}

function renderShop() {
  const c = document.getElementById('shop-content');
  c.innerHTML = '';

  if (currentTab === 'shovels') {
    for (const s of SHOVELS) {
      const locked = gs.level < s.unlockLvl;
      const owned  = gs.currentShovel === s.id;
      const cant   = !owned && !locked && gs.coins < s.cost;
      const d = document.createElement('div');
      d.className = 'shop-item' + (locked?' locked':'') + (cant?' cant-afford':'') + (owned?' owned-active':'');
      d.innerHTML = `
        <div class="shop-item-icon">${s.icon}</div>
        <div class="shop-item-body">
          <div class="shop-item-header">
            <span class="shop-item-name">${s.name}</span>
            <span class="shop-item-cost">${owned ? '✅ Active' : s.cost===0 ? 'FREE' : fmt(s.cost)+'🪙'}</span>
          </div>
          <div class="shop-item-desc">${locked ? `🔒 Unlock at level ${s.unlockLvl}` : `${s.desc} · +${s.cpc}🪙/click · +${s.xpc}⭐/click`}</div>
        </div>`;
      if (!locked && !owned) d.onclick = () => buyShovel(s.id);
      c.appendChild(d);
    }
  } else if (currentTab === 'miners') {
    for (const m of MINERS) {
      const locked = gs.level < m.unlockLvl;
      const count  = gs.miners[m.id] || 0;
      const cost   = minerCost(m);
      const cant   = !locked && gs.coins < cost;
      const d = document.createElement('div');
      d.className = 'shop-item' + (locked?' locked':'') + (cant?' cant-afford':'');
      d.innerHTML = `
        <div class="shop-item-icon">${m.icon}</div>
        <div class="shop-item-body">
          <div class="shop-item-header">
            <span class="shop-item-name">${m.name}</span>
            <span class="shop-item-cost">${locked ? '🔒' : fmt(cost)+'🪙'}</span>
          </div>
          <div class="shop-item-desc">${locked ? `Unlock at level ${m.unlockLvl}` : `${m.desc} · ⚡${m.cps}/s · ⭐${m.xps}/s`}</div>
        </div>
        ${count > 0 ? `<div class="shop-item-count">×${count}</div>` : ''}`;
      if (!locked) d.onclick = () => buyMiner(m.id);
      c.appendChild(d);
    }
  } else {
    for (const a of ACCESSORIES) {
      const locked = gs.level < a.unlockLvl;
      const owned  = !!gs.accessories[a.id];
      const cant   = !locked && !owned && gs.coins < a.cost;
      const d = document.createElement('div');
      d.className = 'shop-item' + (locked?' locked':'') + (cant?' cant-afford':'') + (owned?' owned-active':'');
      d.innerHTML = `
        <div class="shop-item-icon">${a.icon}</div>
        <div class="shop-item-body">
          <div class="shop-item-header">
            <span class="shop-item-name">${a.name}</span>
            <span class="shop-item-cost">${owned ? '✅ Owned' : locked ? '🔒' : fmt(a.cost)+'🪙'}</span>
          </div>
          <div class="shop-item-desc">${locked ? `Unlock at level ${a.unlockLvl}` : `${a.desc}`}</div>
        </div>`;
      if (!locked && !owned) d.onclick = () => buyAccessory(a.id);
      c.appendChild(d);
    }
  }
}

function renderAll() {
  renderStats();
  renderLog();
  renderCollection();
  renderShop();
}

// ─────────────────────────────────────────────
// TICK
// ─────────────────────────────────────────────

let lastTick = Date.now();
function tick() {
  const now = Date.now();
  const dt  = (now - lastTick) / 1000;
  lastTick  = now;
  const cps = coinsPerSecond();
  const xps = xpPerSecond();
  if (cps > 0 || xps > 0) {
    gs.coins  += cps * dt;
    xpAccum   += xps * dt;
    if (xpAccum >= 1) { const w = Math.floor(xpAccum); xpAccum -= w; addXP(w); }
    renderStats();
  }
}
setInterval(tick, 100);

// ─────────────────────────────────────────────
// SAVE / LOAD
// ─────────────────────────────────────────────

const SAVE_KEY = 'treasureHunterSave';

function saveGame() {
  gs.lastSave = Date.now();
  localStorage.setItem(SAVE_KEY, JSON.stringify(gs));
  const ind = document.getElementById('save-indicator');
  if (ind) { ind.textContent = '💾 Saved!'; setTimeout(() => ind.textContent='💾 Auto-saves', 1500); }
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return;
  try {
    const saved = JSON.parse(raw);
    const keys = ['coins','xp','level','totalDigs','currentShovel','miners','accessories','inventory','log','lastSave'];
    for (const k of keys) {
      if (saved[k] === undefined) continue;
      if (typeof saved[k] === 'object' && saved[k] !== null && !Array.isArray(saved[k]))
        gs[k] = Object.assign({}, gs[k], saved[k]);
      else gs[k] = saved[k];
    }
    if (Array.isArray(saved.log)) gs.log = saved.log;

    const offSec = Math.min((Date.now() - gs.lastSave) / 1000, 8*3600);
    const cps = coinsPerSecond(), xps = xpPerSecond();
    if (offSec > 10 && (cps > 0 || xps > 0)) {
      gs.coins += cps * offSec;
      if (xps * offSec >= 1) addXP(Math.floor(xps * offSec));
      const n = document.createElement('div');
      n.id = 'offline-notice';
      n.innerHTML = `⏰ Welcome back! Earned <strong>${fmt(cps*offSec)} 🪙</strong> while away.`;
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 4000);
    }
  } catch(e) { console.warn('Load error', e); }
}

function resetGame() {
  if (!confirm('Reset ALL progress? This cannot be undone!')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

setInterval(saveGame, 10000);
window.addEventListener('beforeunload', saveGame);

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadGame();
renderAll();
</script>
