<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.03); }

    #restartBtn {
      background: #e94560;
      color: #fff;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      color: #aaa;
    }

    .mode-toggle input[type="checkbox"] {
      width: 36px;
      height: 20px;
      appearance: none;
      background: #444;
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .mode-toggle input[type="checkbox"]:checked {
      background: #a8dadc;
    }

    .mode-toggle input[type="checkbox"]::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }

    .mode-toggle input[type="checkbox"]:checked::after {
      left: 18px;
    }

    .score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      color: #aaa;
    }

    .score span { font-weight: bold; color: #eee; }
  </style>
</head>
<body>
  <h1>TIC-TAC-TOE</h1>

  <div class="score">
    <div>X Wins: <span id="xScore">0</span></div>
    <div>Draws: <span id="draws">0</span></div>
    <div>O Wins: <span id="oScore">0</span></div>
  </div>

  <div class="status" id="status">Player X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div class="controls">
    <button id="restartBtn">Restart</button>
    <label class="mode-toggle">
      <input type="checkbox" id="aiToggle">
      vs Computer
    </label>
  </div>

  <script>
    const cells = document.querySelectorAll('.cell');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restartBtn');
    const aiToggle = document.getElementById('aiToggle');
    const xScoreEl = document.getElementById('xScore');
    const oScoreEl = document.getElementById('oScore');
    const drawsEl = document.getElementById('draws');

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver, scores = { X: 0, O: 0, D: 0 };

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      statusEl.textContent = "Player X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: 'draw' };
      return null;
    }

    function applyMove(i, player) {
      board[i] = player;
      cells[i].textContent = player;
      cells[i].classList.add(player.toLowerCase(), 'taken');
    }

    function endGame(result) {
      gameOver = true;
      if (result.winner === 'draw') {
        statusEl.textContent = "It's a draw!";
        scores.D++;
        drawsEl.textContent = scores.D;
      } else {
        statusEl.textContent = `Player ${result.winner} wins!`;
        result.line.forEach(i => cells[i].classList.add('win'));
        scores[result.winner]++;
        xScoreEl.textContent = scores.X;
        oScoreEl.textContent = scores.O;
      }
    }

    // Minimax AI
    function minimax(b, isMax) {
      const result = checkWinnerOn(b);
      if (result === 'O') return 10;
      if (result === 'X') return -10;
      if (b.every(v => v)) return 0;

      if (isMax) {
        let best = -Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false));
            b[i] = '';
          }
        });
        return best;
      } else {
        let best = Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true));
            b[i] = '';
          }
        });
        return best;
      }
    }

    function checkWinnerOn(b) {
      for (const [a, bI, c] of WINS) {
        if (b[a] && b[a] === b[bI] && b[a] === b[c]) return b[a];
      }
      return null;
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      board.forEach((v, i) => {
        if (!v) {
          board[i] = 'O';
          const score = minimax(board, false);
          board[i] = '';
          if (score > best) { best = score; move = i; }
        }
      });
      return move;
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      applyMove(i, current);
      const result = checkWinner();
      if (result) { endGame(result); return; }

      current = current === 'X' ? 'O' : 'X';
      statusEl.textContent = `Player ${current}'s turn`;

      if (aiToggle.checked && current === 'O' && !gameOver) {
        setTimeout(() => {
          const move = bestMove();
          applyMove(move, 'O');
          const r2 = checkWinner();
          if (r2) { endGame(r2); return; }
          current = 'X';
          statusEl.textContent = "Player X's turn";
        }, 200);
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => handleClick(+cell.dataset.i));
    });

    restartBtn.addEventListener('click', init);
    aiToggle.addEventListener('change', init);

    init();
  </script>
</body>
</html>
